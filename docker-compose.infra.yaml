  # ─── Redis Master-Replica-Sentinel ────────────────────
#  redis-master:
  redis:
    image: redis:7-alpine
    container_name: pgsg-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_master_data:/data
    networks:
      - pgsg-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

