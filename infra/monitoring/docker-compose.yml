version: '3.8'

services:
  # 1. 로그 저장소 (창고)
  loki:
    image: grafana/loki:2.9.1
    container_name: pgsg-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - pgsg-network

  # 2. 로그 수집기 (배달원: Kafka -> Loki)
  promtail:
    image: grafana/promtail:2.9.1
    container_name: pgsg-promtail
    volumes:
      - ./promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    environment:
      - BOOTSTRAP_SERVERS=${BOOTSTRAP_SERVERS:-kafka:29092} # 환경변수 처리
    depends_on:
      - loki
    networks:
      - pgsg-network

  # 3. 시각화 도구 (관제 화면)
  grafana:
    image: grafana/grafana:latest
    container_name: pgsg-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # 초기 비밀번호
    depends_on:
      - loki
    networks:
      - pgsg-network

networks:
  pgsg-network:
    driver: bridge