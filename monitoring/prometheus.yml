global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gateway-server
    static_configs:
      - targets: ['34.64.155.241:8090' , '34.64.230.151:8090' , '34.47.121.176:8090']
    metrics_path: /actuator/prometheus

  - job_name: user-service
    static_configs:
      - targets: ['34.22.69.213:8081','34.22.88.25:8081']
    metrics_path: /actuator/prometheus

  - job_name: product-service
    static_configs:
      - targets: ['10.178.0.2:8082']
    metrics_path: /actuator/prometheus

  - job_name: trade-service
    static_configs:
      - targets: ['34.64.117.237:8083']
    metrics_path: /actuator/prometheus

  - job_name: reservation-service
    static_configs:
      - targets: ['34.64.247.238:8085']
    metrics_path: /actuator/prometheus

  - job_name: chat-service
    static_configs:
      - targets: ['34.64.177.124:8084']
    metrics_path: /actuator/prometheus

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml