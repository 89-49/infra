# rules/alert-rules.yml
groups:
  - name: service-alerts
    rules:
      # 서비스 다운 감지
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "서비스 다운: {{ $labels.job }}"
          description: "{{ $labels.job }} 서비스가 1분 이상 응답하지 않습니다."

      # 높은 응답 시간
      - alert: HighResponseTime
        expr: http_server_requests_seconds_max > 3
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "응답 시간 초과: {{ $labels.job }}"
          description: "{{ $labels.job }} 서비스의 응답 시간이 3초를 초과했습니다."

      # 높은 에러율
      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "에러율 증가: {{ $labels.job }}"
          description: "{{ $labels.job }} 서비스의 5xx 에러율이 증가했습니다."

  - name: system-alerts
    rules:
      # JVM 메모리 사용량
      - alert: HighMemoryUsage
        expr: jvm_memory_used_bytes / jvm_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "메모리 사용량 높음: {{ $labels.job }}"
          description: "{{ $labels.job }} 서비스의 JVM 메모리 사용량이 85%를 초과했습니다."

      # DB 커넥션 풀 고갈
      - alert: DBConnectionPoolExhausted
        expr: hikaricp_connections_active / hikaricp_connections_max > 0.9
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "DB 커넥션 풀 부족: {{ $labels.job }}"
          description: "{{ $labels.job }} 서비스의 DB 커넥션 풀이 90%를 초과했습니다."